version: 2
updates:
  # Maintain dependencies for Maven (since the module uses pom.xml)
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "dev" # Sends all Dependabot PRs to your dev branch
    schedule:
      interval: "weekly"
      
  # Maintain GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"